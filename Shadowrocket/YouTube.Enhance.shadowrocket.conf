#!name=YouTube (Music) Enhance for Shadowrocket
#!desc=适配 Shadowrocket 的 YouTube 与 YouTube Music 增强模块（去广告、画中画、后台播放、翻译）
#
# 原模块：YouTube.Enhance.sgmodule
# 脚本地址：https://raw.githubusercontent.com/Maasea/sgmodule/master/Script/Youtube/youtube.response.js
#
# 说明：
# 1. Shadowrocket 不支持 Surge 的 #!arguments 变量替换语法，因此本模块采用固定参数。
# 2. 如需修改功能开关，请编辑下方 [Script] 段中 argument 的 JSON 值。
# 3. 所有布尔值请使用 JSON 布尔（true/false），字符串请使用双引号包裹。
#
# 默认参数：
# - blockUpload: true     屏蔽上传按钮
# - blockImmersive: true  屏蔽选段按钮
# - blockShorts: false    屏蔽 Shorts 按钮
# - captionLang: "off"    字幕翻译语言（off 为关闭，或填入 Google Translate 语言代码）
# - lyricLang: "off"      歌词翻译语言（off 为关闭，或填入 Google Translate 语言代码）
# - debug: false          调试模式
#
# 兼容性提示：
# - 请确保 Shadowrocket 版本支持 [Script] http-response、binary-body-mode=1 以及 argument 参数。
# - MITM 必须安装并信任证书，hostname 已配置为通配 googlevideo 及 youtubei.googleapis.com。

[Rule]
# 拦截 YouTube 视频流相关的 UDP 广告/追踪请求
AND,((DOMAIN-SUFFIX,googlevideo.com), (PROTOCOL,UDP)),REJECT
AND,((DOMAIN,youtubei.googleapis.com), (PROTOCOL,UDP)),REJECT

[Script]
# 拦截 YouTube / YouTube Music 的 protobuf 响应体并进行增强处理
# - type=http-response：仅在收到响应时执行脚本
# - pattern：匹配 youtubei.googleapis.com 下的关键 API 端点
# - requires-body=1：允许脚本读取响应体
# - max-size=-1：不限制响应体大小，确保 protobuf 大体积响应可被处理
# - binary-body-mode=1：以二进制方式传递响应体，youtube.response.js 内部自行解码 protobuf
# - script-path：指向与 Surge 模块完全一致的远程脚本，保证功能一致
# - argument：传递给脚本的 JSON 配置对象；Shadowrocket 不支持 Surge 的 {{{}}} 变量，故使用固定值
youtube.response = type=http-response,pattern=^https:\/\/youtubei\.googleapis\.com\/(youtubei\/v1\/(browse|next|player|search|reel\/reel_watch_sequence|guide|account\/get_setting|get_watch))(\?(.*))?$,requires-body=1,max-size=-1,binary-body-mode=1,script-path=https://raw.githubusercontent.com/Maasea/sgmodule/master/Script/Youtube/youtube.response.js,argument={"lyricLang":"off","captionLang":"off","blockUpload":true,"blockImmersive":true,"blockShorts":false,"debug":false}

[Map Local]
# 屏蔽视频播放初始化阶段的广告请求，直接返回空文本
^https?:\/\/[\w-]+\.googlevideo\.com\/initplayback.+&oad data-type=text data="" status-code=200

[MITM]
# 必须对以下域名启用中间人攻击（HTTPS 解密），否则脚本无法读取加密响应体
hostname = *.googlevideo.com, youtubei.googleapis.com
